services:
  fastapi:
    image: ghcr.io/kazuki-0418/personal-daily-news:latest
    container_name: personal-daily-news-fastapi
    restart: unless-stopped
    env_file:
      - ./secrets.env
    networks:
      - internal
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: personal-daily-news-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - ./secrets.env
    networks:
      - internal
    depends_on:
      fastapi:
        condition: service_healthy

networks:
  internal:
    driver: bridge
